# Define
schemes:
  # Nightfox Alacritty Colors
  # Style: duskfox
  # Upstream: https://github.com/edeneast/nightfox.nvim/raw/main/extra/duskfox/nightfox_alacritty.yml
  duskfox: &duskfox
    # Default colors
    primary:
      background: '0x232136'
      foreground: '0xe0def4'
        # Normal colors
      normal:
        black:   '0x393552'
      red:     '0xeb6f92'
      green:   '0xa3be8c'
      yellow:  '0xf6c177'
      blue:    '0x569FBA'
      magenta: '0xc4a7e7'
      cyan:    '0x9ccfd8'
      white:   '0xe0def4'
        # Bright colors
      bright:
        black:   '0x433C6E'
        red:     '0xEF7C9D'
        green:   '0xAECB93'
        yellow:  '0xF8C886'
        blue:    '0x5FABC7'
        magenta: '0xC8AEEB'
        cyan:    '0xA3D6DF'
        white:   '0xE1DFF6'
      indexed_colors:
        - { index: 16, color: '0xea9a97' }
        - { index: 17, color: '0xEB98C3' }
  dayfox: &dayfox
  # Nightfox Alacritty Colors
  # Style: dayfox
  # Upstream: https://github.com/edeneast/nightfox.nvim/raw/main/extra/dayfox/nightfox_alacritty.yml
  # Default colors
    primary:
      background: '0xEAEAEA'
      foreground: '0x1D344F'
    # Normal colors
    normal:
      black:   '0x1d344f'
      red:     '0xB95D76'
      green:   '0x618774'
      yellow:  '0xBA793E'
      blue:    '0x6080b0'
      magenta: '0x8e6f98'
      cyan:    '0x6CA7BD'
      white:   '0xcdd1d5'
    # Bright colors
    bright:
      black:   '0x24476F'
      red:     '0xC76882'
      green:   '0x629F81'
      yellow:  '0xCA884A'
      blue:    '0x678ABF'
      magenta: '0x9F75AC'
      cyan:    '0x74B2C9'
      white:   '0xCFD6DD'
    indexed_colors:
      - { index: 16, color: '0xE3786C' }
      - { index: 17, color: '0xD685AF' }

# Apply
colors: *duskfox
