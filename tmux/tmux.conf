# bind -n C-k run "($is_vim && tmux send-keys C-k) || \
#                           ($is_fzf && tmux send-keys C-k)  || \
#                           tmux select-pane -U"

# bind -n C-l run  "($is_vim && tmux send-keys C-l) || \
#                           tmux select-pane -R"

# bind -n 'C-\' if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

bind -r C-k select-pane -U
bind -r C-j select-pane -D
bind -r C-h select-pane -L
bind -r C-l select-pane -R

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ';' executes last command if we're not in vim
# bind -n \; run "(!($is_vim) && tmux send-keys Up Enter) || tmux send-keys '\;;'"
bind -n C-z \
  select-window -l \; \
  send-keys Up Enter

# easily rearrange windows
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

set -g mouse on
set -sg escape-time 0
set -g focus-events on
set-option -g default-terminal "screen-256color"
#set-option -g default-terminal "xterm-256color"
# set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -ga terminal-overrides ",*256col*:Tc"

#set -g status-bg "#363c4a"
#set -g status-fg "#ffffff"
set -g status-right ""

# Start windows at 1 and not 0, because 0 is far from 1 in the keyboard
set -g base-index 1
setw -g pane-base-index 1

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'git@github.com/user/plugin'
# set -g @plugin 'git@bitbucket.com/user/plugin'

# Resurrect
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-processes 'ssh mysql "nvim->nvim -S"'

#  Continuum
set -g @plugin 'tmux-plugins/tmux-continuum'
# set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
